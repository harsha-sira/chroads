<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

// ── Site config ───────────────────────────────────────────────────────────────
const SITE_CONFIG = {
  showAds: false,
  showBmc: false,
  bmcUrl:  'https://buymeacoffee.com/sinhalachords',
};

// ── Routing constants — update both when moving to a custom domain ────────────
const BASE_PATH = '';
const BASE_URL  = 'https://sinhalachords.com';

const SONGS   = window.SONGS_DATA;
const ARTISTS = window.ARTISTS_DATA || {};

function chunkFile(id) {
  const n  = Math.ceil(id / 50);
  const lo = String((n-1)*50+1).padStart(3,'0');
  const hi = String(n*50).padStart(3,'0');
  return `data/songs-content-${lo}-${hi}.js`;
}
function loadChunk(id, onDone) {
  if (window.SONGS_CONTENT && window.SONGS_CONTENT[id] !== undefined) { onDone(); return; }
  const s = document.createElement('script');
  s.src = chunkFile(id);
  s.onload = onDone;
  document.head.appendChild(s);
}

// ── URL / slug helpers ────────────────────────────────────────────────────────
function slugify(str) {
  return str.toLowerCase()
    .replace(/&/g, 'and')
    .replace(/\s+/g, '-')
    .replace(/[^a-z0-9-]/g, '');
}

function getUrl(view, extras) {
  if (view === 'song' && extras.songId) {
    const s = SONGS.find(s => s.id === extras.songId);
    if (s) return `${BASE_PATH}/song/${slugify(s.titleRoman)}`;
  }
  if (view === 'artist' && extras.artist) return `${BASE_PATH}/artist/${slugify(extras.artist)}`;
  if (view === 'allArtists') return `${BASE_PATH}/artists`;
  return `${BASE_PATH}/`;
}

function parseUrl() {
  let path = window.location.pathname.replace(BASE_PATH, '') || '/';
  if (!path.startsWith('/')) path = '/' + path;

  if (path.startsWith('/song/')) {
    const slug = path.slice(6).replace(/\/$/, '');
    const song = SONGS.find(s => slugify(s.titleRoman) === slug);
    if (song) return { view: 'song', songId: song.id };
  }
  if (path.startsWith('/artist/')) {
    const slug = path.slice(8).replace(/\/$/, '');
    const artist = [...new Set(SONGS.map(s => s.artist))].find(a => slugify(a) === slug);
    if (artist) return { view: 'artist', artist };
  }
  if (path === '/artists' || path === '/artists/') return { view: 'allArtists' };
  return { view: 'home' };
}

// ── SEO updater — called on every navigation ──────────────────────────────────
function updateSEO(entry) {
  const { view, songId, artist } = entry;
  const SITE = 'Sinhala Chords';
  let title = `${SITE} — Free Sinhala Guitar Chords & Lyrics`;
  let desc  = 'Your go-to place for free Sinhala guitar chord charts. Find chords and lyrics for your favourite Sinhala songs.';
  let url   = `${BASE_URL}/`;
  let graph = [{
    '@type': 'WebSite',
    name: SITE,
    alternateName: 'Sinhala Guitar Chords',
    url: `${BASE_URL}/`,
    inLanguage: ['si', 'en'],
    potentialAction: { '@type': 'SearchAction', target: `${BASE_URL}/?search={search_term_string}`, 'query-input': 'required name=search_term_string' }
  }];

  if (view === 'song' && songId) {
    const s = SONGS.find(s => s.id === songId);
    if (s) {
      url   = `${BASE_URL}/song/${slugify(s.titleRoman)}`;
      title = `${s.titleRoman} Chords — ${s.artist} | ${SITE}`;
      desc  = s.description ||
              (`Free guitar chords for ${s.titleRoman}${s.titleSi ? ' ('+s.titleSi+')' : ''} by ${s.artist}. `
            + `Key: ${s.key}${s.capo ? ', Capo '+s.capo : ''}. Beat: ${s.beat}. `
            + `Sinhala guitar chord chart with transpose tool.`);
      graph.push({
        '@type': 'MusicComposition',
        name: s.titleRoman,
        alternateName: s.titleSi || undefined,
        url,
        inLanguage: 'si',
        composer: { '@type': 'Person', name: s.artist },
        musicArrangement: `${s.titleRoman} Guitar Chords`,
        description: desc,
      });
    }
  } else if (view === 'artist' && artist) {
    const count = SONGS.filter(s => s.artist === artist).length;
    url   = `${BASE_URL}/artist/${slugify(artist)}`;
    title = `${artist} Guitar Chords (${count} songs) | ${SITE}`;
    const artistInfo = ARTISTS[artist];
    desc  = (artistInfo && artistInfo.description)
          || (`${count} free Sinhala guitar chord chart${count!==1?'s':''} for ${artist}. `
            + `Play your favourite ${artist} songs with accurate chord charts.`);
    graph.push({ '@type': 'Person', name: artist, url });
  } else if (view === 'allArtists') {
    url   = `${BASE_URL}/artists`;
    title = `All Artists | ${SITE}`;
    desc  = `Browse all Sinhala artists and their free guitar chord charts on ${SITE}.`;
  }

  document.title = title;
  setMeta('name',     'description',       desc);
  setMeta('property', 'og:title',          title);
  setMeta('property', 'og:description',    desc);
  setMeta('property', 'og:url',            url);
  setMeta('name',     'twitter:title',     title);
  setMeta('name',     'twitter:description', desc);
  document.querySelector('link[rel=canonical]').href = url;
  document.getElementById('ld-json').textContent = JSON.stringify({ '@context': 'https://schema.org', '@graph': graph });
}

function setMeta(attr, key, val) {

  if (el) el.setAttribute('content', val);
}

// ── Music utilities ───────────────────────────────────────────────────────────
const SHARP = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const FLAT  = ['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'];
function noteIdx(n) { let i=SHARP.indexOf(n); return i!==-1?i:FLAT.indexOf(n); }
function transposeNote(note, st) {
  const useFl = note.includes('b')||note==='F';
  const arr = useFl?FLAT:SHARP;
  let i = arr.indexOf(note);
  if (i===-1) { i=SHARP.indexOf(note); if(i===-1) return note; return SHARP[((i+st)%12+12)%12]; }
  return arr[((i+st)%12+12)%12];
}
function transposeChord(chord, st) {
  if (!st) return chord;
  const m=chord.match(/^([A-G][#b]?)(.*)/); if(!m) return chord;
  return transposeNote(m[1],st)+m[2];
}
const CHORD_PAT = /^[A-G][#b]?(m|M|maj7?|min|dim|aug|sus[24]?|add[29]?)?[0-9]*(\/[A-G][#b]?)?$/;
function isChordToken(tok) {
  const t=tok.replace(/^[|]+/,'').replace(/[-|]+$/,'');
  return t.length>0&&t.length<=9&&CHORD_PAT.test(t);
}
function isChordLine(line) {
  const t=line.trim(); if(!t||t.startsWith('[')) return false;
  const toks=t.split(/\s+/).filter(Boolean); if(!toks.length) return false;
  const ct=toks.filter(isChordToken).length;
  return ct>=1&&ct/toks.length>=0.55;
}
const INLINE_CHORD_RE = /([A-G][#b]?(?:m|M|maj7?|min|dim|aug|sus[24]?|add[29]?)?[0-9]*(?:\/[A-G][#b]?)?)/g;
function semitonesTo(fromKey, toNote) {
  const fn=fromKey.match(/^([A-G][#b]?)/)?.[1]; if(!fn) return 0;
  let fi=noteIdx(fn),ti=noteIdx(toNote); if(fi===-1||ti===-1) return 0;
  let st=((ti-fi)%12+12)%12; if(st>6) st-=12; return st;
}

// ── Chord Sheet ───────────────────────────────────────────────────────────────
function ChordLine({ line, semitones }) {
  const transposed = semitones
    ? line.replace(new RegExp(INLINE_CHORD_RE.source,'g'), m=>isChordToken(m)?transposeChord(m,semitones):m)
    : line;
  const parts=[]; let last=0;
  const re=new RegExp(INLINE_CHORD_RE.source,'g'); let m;
  while((m=re.exec(transposed))!==null){
    if(!isChordToken(m[1])) continue;
    if(m.index>last) parts.push(<span key={`t${last}`}>{transposed.slice(last,m.index)}</span>);
    parts.push(<span key={`c${m.index}`} className="cs-chord-name">{m[1]}</span>);
    last=m.index+m[0].length;
  }
  if(last<transposed.length) parts.push(<span key="tail">{transposed.slice(last)}</span>);
  return <span className="cs-chord-line">{parts}</span>;
}

function ChordSheet({ content, semitones }) {
  return (
    <div className="chord-sheet-wrap">
      <div className="chord-sheet">
        {content.split('\n').map((line,i)=>{
          const t=line.trim();
          if(!t) return <span key={i} className="cs-empty" />;
          if(t.startsWith('[')||t.endsWith(']')) return <span key={i} className="cs-section">{t}</span>;
          if(t.startsWith('Place the capo')||t.startsWith('Original Key')) return <span key={i} className="cs-meta-note">{t}</span>;
          if(isChordLine(line)) return <ChordLine key={i} line={line} semitones={semitones}/>;
          return <span key={i} className="cs-lyric">{line}</span>;
        })}
      </div>
    </div>
  );
}

    localStorage.setItem('ch_theme',theme);
  },[theme]);

  // Update URL + SEO on every navigation
  useEffect(()=>{
    updateSEO(current);
  },[current]);

  // Handle browser back/forward buttons
  useEffect(()=>{
    const handler = (e)=>{
      setStack([e.state && e.state.view ? e.state : parseUrl()]);
    };
    window.addEventListener('popstate',handler);
    return ()=>window.removeEventListener('popstate',handler);
  },[]);

  const push = (view,extras={}) => {
    const url = getUrl(view,extras);
    window.history.pushState({view,...extras},'',url);
    setStack(s=>[...s,{view,...extras}]);
    window.scrollTo(0,0);
  };

  const goBack = ()=>{
    window.history.back();
    setStack(s=>s.length>1?s.slice(0,-1):[{view:'home'}]);
    window.scrollTo(0,0);
  };

  const goHome = ()=>{
    window.history.pushState({view:'home'},'',`${BASE_PATH}/`);
    setStack([{view:'home'}]);
    window.scrollTo(0,0);
  };

  const song = SONGS.find(s=>s.id===current.songId);

  return (
    <>
      <Nav theme={theme} toggleTheme={()=>setTheme(t=>t==='dark'?'light':'dark')}
        onBack={goBack} onHome={goHome} showBack={canGoBack} />

      {current.view==='home'       && <HomePage songs={SONGS} onSelectSong={id=>push('song',{songId:id})} onAllArtists={()=>push('allArtists')} />}
      {current.view==='allArtists' && <AllArtistsPage songs={SONGS} onSelectArtist={name=>push('artist',{artist:name})} />}
      {current.view==='artist'     && <ArtistPage artistName={current.artist} songs={SONGS} onSelectSong={id=>push('song',{songId:id})} />}
      {current.view==='song'&&song  && <SongView song={song} songs={SONGS} onSelectSong={id=>push('song',{songId:id})} onArtist={name=>push('artist',{artist:name})} />}
      {current.view==='privacy'    && <PrivacyPage />}
      {current.view==='terms'      && <TermsPage />}
      {current.view==='contact'    && <ContactPage />}

      <Footer onNav={view=>push(view)} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
