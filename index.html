:root {
  --bg: #ffffff;
  --surface: #f5f5f7;
  --surface2: #ebebed;
  --border: #e0e0e2;
  --text: #1a1820;
  --text-muted: #9b98a3;
  --text-dim: #6b6870;
  --chord: #2563eb;
  --chord-bg: rgba(37,99,235,0.07);
  --section: #7c3aed;
  --nav-h: 56px;
}
[data-theme="dark"] {
  --bg: #0d0c10;
  --surface: #16141c;
  --surface2: #1e1c27;
  --border: #2d2b38;
  --text: #ede9e3;
  --text-muted: #6b6780;
  --text-dim: #9d99aa;
  --chord: #f5a623;
  --chord-bg: rgba(245,166,35,0.08);
  --section: #a78bfa;
}
html { scroll-behavior: smooth; }
body {
  font-family: 'Space Grotesk', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  transition: background 0.2s, color 0.2s;

}
button { font-family: inherit; cursor: pointer; border: none; background: none; }
a { color: inherit; text-decoration: none; }

/* ── NAV ── */
.nav {
  position: sticky; top: 0; z-index: 100;
  height: var(--nav-h);
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 16px; gap: 10px;
}
.nav-back {
  width: 36px; height: 36px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; color: var(--text-dim);
  flex-shrink: 0; transition: background 0.12s;
}
.nav-back:hover { background: var(--surface2); }
.nav-logo {
  font-size: 18px; font-weight: 700; letter-spacing: -0.5px;
  color: var(--text); cursor: pointer; flex-shrink: 0;
}
.nav-logo span { color: var(--chord); }
.nav-spacer { flex: 1; }

/* ── THEME TOGGLE SWITCH ── */
.toggle-sw-wrap {
  display: flex; align-items: center; gap: 6px;
  cursor: pointer; flex-shrink: 0; user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.toggle-sw-icon {
  display: flex; align-items: center; justify-content: center;
  color: var(--text-muted); font-size: 0; line-height: 1;
}
.toggle-sw-track {
  width: 40px; height: 22px; border-radius: 11px;
  background: var(--surface2); border: 1.5px solid var(--border);
  position: relative; transition: background 0.2s, border-color 0.2s;
  flex-shrink: 0;
}
.toggle-sw-track.on {
  background: #4c1d95; border-color: #6d28d9;
}
.toggle-sw-thumb {
  position: absolute; top: 2px; left: 2px;
  width: 14px; height: 14px; border-radius: 50%;
  background: var(--text-muted);
  transition: transform 0.2s, background 0.2s;
}
.toggle-sw-track.on .toggle-sw-thumb {
  transform: translateX(18px);
  background: #a78bfa;
}

/* ── HOME ── */
.home { max-width: 600px; margin: 0 auto; padding: 40px 16px 40px; }
.home-hero { margin-bottom: 40px; text-align: center; }
.home-title {
  font-size: 42px; font-weight: 800; letter-spacing: -1.5px; line-height: 1.05;
  margin-bottom: 10px;
}
.home-title span { color: var(--chord); }
.home-sub { color: var(--text-muted); font-size: 15px; margin-bottom: 28px; line-height: 1.5; }
.home-search-wrap { position: relative; text-align: left; }
.home-search {
  width: 100%;
  background: var(--surface);
  border: 1.5px solid var(--border); border-radius: 12px;
  padding: 15px 16px 15px 52px;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 16px; color: var(--text); outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.home-search:focus { border-color: var(--chord); box-shadow: 0 0 0 3px var(--chord-bg); }
.home-search::placeholder { color: var(--text-muted); }
.home-search-icon {
  position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
  color: var(--chord); pointer-events: none;
  display: flex; align-items: center;
}
.section-label {
  font-size: 11px; font-weight: 600; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px;
}
.songs-list { display: flex; flex-direction: column; gap: 2px; }
.song-card {
  background: var(--bg);
  border: 1px solid var(--border); border-radius: 12px;
  padding: 14px 16px; cursor: pointer;
  transition: border-color 0.12s, background 0.12s;
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
}
.song-card:active { background: var(--surface); }
.song-card-left { flex: 1; min-width: 0; }
.song-card-title { font-size: 16px; font-weight: 600; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.song-card-artist { font-size: 13px; color: var(--text-dim); }
.song-card-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
.pill {
  font-size: 11px; font-weight: 500;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 4px; padding: 2px 7px; color: var(--text-dim);
  white-space: nowrap;
}
.pill-key {
  font-size: 13px; font-weight: 700;
  background: var(--chord-bg); border: 2px solid var(--chord);
  border-radius: 8px; padding: 5px 12px; color: var(--chord);
  white-space: nowrap; font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.5px;
}
.pill-beat {
  font-size: 12px; font-weight: 700;
  background: var(--surface2); border: 2px solid var(--border);
  border-radius: 8px; padding: 5px 12px; color: var(--text);
  white-space: nowrap; letter-spacing: 0.3px;
}
.no-results { text-align: center; padding: 48px 16px; color: var(--text-muted); }

/* ── SONG VIEW ── */
.song-page { max-width: 600px; margin: 0 auto; padding: 0 16px 80px; }
.song-header { padding: 24px 0 20px; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
.song-title {
  font-size: 32px; font-weight: 700; letter-spacing: -1px;
  line-height: 1.1; margin-bottom: 6px;
}
.song-artist { font-size: 15px; color: var(--text-dim); margin-bottom: 16px; }
.song-artist button { color: var(--chord); font-weight: 600; font-size: 15px; }
.song-meta-row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }

/* ── CHORD SHEET ── */
.chord-sheet-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
.chord-sheet {
  font-family: 'JetBrains Mono', monospace;
  font-size: 15px; line-height: 2;
  white-space: pre; display: block;
  min-width: max-content;
}
.cs-line { display: block; }
.cs-chord-line { display: block; }
.cs-chord-name { color: var(--chord); font-weight: 600; }
.cs-section {
  display: block;
  font-family: 'Space Grotesk', sans-serif;
  color: var(--section); font-size: 12px;
  font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
  margin-top: 6px; margin-bottom: -4px;
}
.cs-lyric {
  display: block;
  font-family: 'Noto Sans Sinhala', monospace;
  font-size: 15px; line-height: 1.8;
  white-space: pre; color: var(--text);
}
.cs-meta-note {
  display: block; font-size: 12px;
  color: var(--text-muted); margin-bottom: 12px;
  font-family: 'Space Grotesk', sans-serif;
  font-style: italic; white-space: normal;
}
.cs-empty { display: block; height: 4px; }

/* ── ADS ── */
.ad-wrap { margin: 20px 0; }
.ad-block {
  border-radius: 10px;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
  background: var(--surface); border: 1px dashed var(--border);
  color: var(--text-muted); font-size: 10px; letter-spacing: 0.8px;
  text-transform: uppercase; font-weight: 500;
}
.ad-block-sm { height: 60px; }
.ad-block-lg { height: 250px; }
.ad-block-inner { font-size: 13px; color: var(--text-dim); }

/* ── INLINE KEY GRID ── */
.inline-keys-wrap { margin-bottom: 24px; }
.inline-keys-label {
  font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
  color: var(--text-muted); text-transform: uppercase; margin-bottom: 10px;
}
.inline-keys-grid {
  display: grid; grid-template-columns: repeat(6, 44px); gap: 6px;
}
.ikey-btn {
  width: 44px; height: 36px; padding: 0;
  border-radius: 8px; font-size: 12px; font-weight: 600;
  background: var(--surface); border: 1.5px solid var(--border);
  color: var(--text); cursor: pointer; text-align: center;
  font-family: 'JetBrains Mono', monospace;
  transition: all 0.1s; -webkit-tap-highlight-color: transparent;
}
.ikey-btn.active { background: #2563eb; border-color: #2563eb; color: #fff; }
.ikey-btn:active { transform: scale(0.95); }

/* ── MORE BY ARTIST ── */
.more-section { margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--border); }
.more-title { font-size: 12px; font-weight: 600; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 12px; }
.more-list { display: flex; flex-direction: column; gap: 2px; }
.more-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 14px; border-radius: 10px; cursor: pointer;

.more-item:active { background: var(--surface); }
.more-item.current { background: var(--chord-bg); }

/* ── ARTIST PAGE ── */
.artist-page { max-width: 600px; margin: 0 auto; padding: 28px 16px 80px; }
.artist-name { font-size: 32px; font-weight: 700; letter-spacing: -1px; margin-bottom: 4px; }
.artist-count { font-size: 14px; color: var(--text-muted); margin-bottom: 28px; }
.artist-list { display: flex; flex-direction: column; gap: 2px; }
.artist-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px; border-radius: 12px; cursor: pointer;
  border: 1px solid transparent; transition: all 0.1s;
  -webkit-tap-highlight-color: transparent;
}
.artist-item:active { background: var(--surface); border-color: var(--border); }
.artist-item-title { font-size: 16px; font-weight: 600; }
.artist-item-meta { display: flex; gap: 6px; }

/* ── BUY ME A COFFEE ── */
.bmc-hero {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 8px 16px; border-radius: 24px;
  background: #FFDD00; color: #000;
  font-size: 13px; font-weight: 700; text-decoration: none;
  margin-bottom: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.1);
}

/* ── FOOTER ── */
.footer {
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 32px 16px 40px;
  margin-top: 0;
}
.footer-inner {
  max-width: 600px; margin: 0 auto;
  display: flex; flex-direction: column; gap: 20px;
}
.footer-brand { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
.footer-brand span { color: var(--chord); }
.footer-tagline { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
.footer-nav-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 20px;

.footer-nav-col h4 {
  font-size: 11px; font-weight: 700; letter-spacing: 1.2px;
  text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px;

  display: block; font-size: 14px; color: var(--text-dim);
  padding: 4px 0; transition: color 0.12s;
}
.footer-nav-col a:hover { color: var(--chord); }
.footer-bottom {
  border-top: 1px solid var(--border); padding-top: 16px;
  display: flex; flex-wrap: wrap; gap: 8px;
  align-items: center; justify-content: space-between;

.footer-copy { font-size: 12px; color: var(--text-muted); }
.footer-legal { display: flex; gap: 16px; }
.footer-legal a { font-size: 12px; color: var(--text-muted); transition: color 0.12s; }
.footer-legal a:hover { color: var(--chord); }

.legal-page { max-width: 600px; margin: 0 auto; padding: 32px 16px 80px; }
.legal-page h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.8px; margin-bottom: 6px; }
.legal-page .legal-date { font-size: 13px; color: var(--text-muted); margin-bottom: 32px; }
.legal-page h2 { font-size: 16px; font-weight: 700; margin: 24px 0 8px; }
.legal-page p { font-size: 14px; line-height: 1.7; color: var(--text-dim); margin-bottom: 12px; }
.legal-page ul { padding-left: 20px; margin-bottom: 12px; }
.legal-page li { font-size: 14px; line-height: 1.7; color: var(--text-dim); margin-bottom: 4px; }
.legal-page a { color: var(--chord); text-decoration: underline; }

/* ── CONTACT FORM ── */
.contact-form { display: flex; flex-direction: column; gap: 14px; margin-top: 24px; }
.contact-form label { font-size: 12px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; color: var(--text-muted); display: block; margin-bottom: 5px; }
.contact-form input,
.contact-form textarea,
.contact-form select {
  width: 100%; background: var(--surface);
  border: 1.5px solid var(--border); border-radius: 10px;
  padding: 12px 14px; font-family: 'Space Grotesk', sans-serif;
  font-size: 15px; color: var(--text); outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;

.contact-form input:focus,
.contact-form textarea:focus,
.contact-form select:focus { border-color: var(--chord); box-shadow: 0 0 0 3px var(--chord-bg); }
.contact-form textarea { resize: vertical; min-height: 120px; }
.contact-form .submit-btn {
  padding: 14px; border-radius: 10px; font-size: 15px; font-weight: 700;
  background: var(--chord); color: #fff; border: none; cursor: pointer;
  transition: opacity 0.15s;
}
.contact-form .submit-btn:active { opacity: 0.8; }
</style>

  let i = SHARP.indexOf(n); if (i !== -1) return i;

function isChordToken(tok) {
  const t = tok.replace(/^[|]+/, '').replace(/[-|]+$/, '');

}
function isChordLine(line) {
  const t = line.trim();

function semitonesTo(fromKey, toNote) {
  const fn = fromKey.match(/^([A-G][#b]?)/)?.[1];

  let st = ((ti - fi) % 12 + 12) % 12;
  if (st > 6) st -= 12;

}

// ── ChordSheet ───────────────────────────────────────────────────────────────
function ChordLine({ line, semitones }) {
  const transposed = semitones
    ? line.replace(new RegExp(INLINE_CHORD_RE.source,'g'), m => isChordToken(m) ? transposeChord(m, semitones) : m)
    : line;
  const parts = [];
  let last = 0;
  const re = new RegExp(INLINE_CHORD_RE.source, 'g');
  let m;
  while ((m = re.exec(transposed)) !== null) {
    if (!isChordToken(m[1])) continue;
    if (m.index > last) parts.push(<span key={`t${last}`}>{transposed.slice(last, m.index)}</span>);
    parts.push(<span key={`c${m.index}`} className="cs-chord-name">{m[1]}</span>);
    last = m.index + m[0].length;
  }
  if (last < transposed.length) parts.push(<span key="tail">{transposed.slice(last)}</span>);
  return <span className="cs-chord-line">{parts}</span>;
}

function ChordSheet({ content, semitones }) {
  return (
    <div className="chord-sheet-wrap">
      <div className="chord-sheet">
        {content.split('\n').map((line, i) => {
          const t = line.trim();
          if (!t) return <span key={i} className="cs-empty" />;
          if (t.startsWith('[') && t.endsWith(']'))
            return <span key={i} className="cs-section">{t}</span>;
          if (t.startsWith('Place the capo') || t.startsWith('Original Key'))
            return <span key={i} className="cs-meta-note">{t}</span>;
          if (isChordLine(line))
            return <ChordLine key={i} line={line} semitones={semitones} />;
          return <span key={i} className="cs-lyric">{line}</span>;
        })}
      </div>
    </div>
  );
}

  return (

      <div className="inline-keys-grid">

          <button
            key={k}

            onClick={() => onPick(k, semitonesTo(song.key, k))}
          >{k}{suffix}</button>
        ))}
      </div>
    </div>
  );
}

function SongView({ song, songs, onSelectSong, onSelectArtist }) {
  const origRoot = song.key.match(/^([A-G][#b]?)/)?.[1] || song.key;
  const [semitones, setSemitones] = useState(() => { const v=localStorage.getItem(`tr_${song.id}`); return v?parseInt(v):0; });
  const [selectedKey, setSelectedKey] = useState(() => localStorage.getItem(`sk_${song.id}`) || origRoot);

  const handleKeyPick = (k, st) => { setSelectedKey(k); setSemitones(st); };

  useEffect(() => { localStorage.setItem(`tr_${song.id}`, semitones); }, [semitones, song.id]);
  useEffect(() => { localStorage.setItem(`sk_${song.id}`, selectedKey); }, [selectedKey, song.id]);

  const artistSongs = songs.filter(s => s.artist === song.artist);

  return (
    <div className="song-page">
      <div className="song-header">
        <div className="song-title">{song.titleRoman}</div>
        <div className="song-artist">
          <button onClick={() => onSelectArtist(song.artist)}>{song.artist}</button>
        </div>
        <div className="song-meta-row">
          <span className="pill-key">⬧ {song.key}</span>
          <span className="pill-beat">{song.beat}</span>
          {song.capo > 0 && <span className="pill">Capo {song.capo}</span>}
        </div>
      </div>

      <InlineKeyGrid song={song} semitones={semitones} selectedKey={selectedKey} onPick={handleKeyPick} />

      <BmcBanner />

      <ChordSheet content={song.content} semitones={semitones} />

      <div className="ad-wrap"><AdBlock size="lg" /></div>

      {artistSongs.length > 1 && (
        <div className="more-section">
          <div className="more-title">More by {song.artist}</div>
          <div className="more-list">
            {artistSongs.map(s => (
              <div
                key={s.id}
                className={`more-item ${s.id===song.id?'current':''}`}
                onClick={() => s.id !== song.id && onSelectSong(s.id)}
              >
                <div className="more-item-title">{s.titleRoman}</div>
                <div style={{display:'flex',gap:6}}>
                  <span className="more-item-meta">Key: {s.key}</span>
                  <span className="more-item-meta">{s.beat}</span>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      <div style={{margin:'20px 0'}}><AdBlock size="sm" /></div>
    </div>
  );
}

            <option value="song-request">Song Request</option>
            <option value="submit-song">Submit a Song</option>
            <option value="correction">Chord Correction</option>
            <option value="copyright">Copyright Issue</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div>
          <label>Message</label>
          <textarea placeholder="Write your message here…" value={form.message} onChange={update('message')} required />
        </div>
        <button type="submit" className="submit-btn">Send Message</button>
      </form>
    </div>
  );
}

// ── Footer ────────────────────────────────────────────────────────────────────
function Footer({ onNav }) {
  return (
    <footer className="footer">
      <div className="footer-inner">
        <div>
          <div className="footer-brand">Sinhala Ch<span>r</span>oads</div>
          <div className="footer-tagline">Your go-to place for Sinhala guitar chord charts</div>
        </div>
        <div className="footer-nav-grid">
          <div className="footer-nav-col">
            <h4>Explore</h4>
            <a href="#" onClick={e => { e.preventDefault(); onNav('home'); }}>All Songs</a>
            <a href="#" onClick={e => { e.preventDefault(); onNav('contact'); }}>Submit a Song</a>
            <a href="#" onClick={e => { e.preventDefault(); onNav('contact'); }}>Request a Song</a>
          </div>
          <div className="footer-nav-col">
            <h4>Support</h4>
            <a href="#" onClick={e => { e.preventDefault(); onNav('contact'); }}>Contact Us</a>
            <a href="#" onClick={e => { e.preventDefault(); onNav('privacy'); }}>Privacy Policy</a>
            <a href="#" onClick={e => { e.preventDefault(); onNav('terms'); }}>Terms &amp; Conditions</a>
          </div>
        </div>
        <div className="footer-bottom">
          <span className="footer-copy">© 2025 Chroads. All rights reserved.</span>
          <div className="footer-legal">
            <a href="#" onClick={e => { e.preventDefault(); onNav('privacy'); }}>Privacy</a>
            <a href="#" onClick={e => { e.preventDefault(); onNav('terms'); }}>Terms</a>
            <a href="#" onClick={e => { e.preventDefault(); onNav('contact'); }}>Contact</a>
          </div>
        </div>
      </div>
    </footer>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [theme,  setTheme]  = useState(() => localStorage.getItem('ch_theme') || 'light');
  const [view,   setView]   = useState('home');
  const [songId, setSongId] = useState(null);
  const [artist, setArtist] = useState(null);

  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('ch_theme', theme);
  }, [theme]);

  const go = (v, extras={}) => {
    if (extras.songId !== undefined) setSongId(extras.songId);
    if (extras.artist !== undefined) setArtist(extras.artist);
    setView(v);
    window.scrollTo(0, 0);
  };

  const song = SONGS.find(s => s.id === songId);
  const isHome = view === 'home';
  const showBack = !isHome;

  return (
    <>
      <Nav
        theme={theme}
        toggleTheme={() => setTheme(t => t==='dark'?'light':'dark')}
        onHome={() => go('home')}
        showBack={showBack}
      />
      {view === 'home' && (
        <HomePage songs={SONGS} onSelectSong={id => go('song',{songId:id})} onSelectArtist={a => go('artist',{artist:a})} />
      )}
      {view === 'song' && song && (
        <SongView song={song} songs={SONGS} onSelectSong={id => go('song',{songId:id})} onSelectArtist={a => go('artist',{artist:a})} />
      )}
      {view === 'artist' && (
        <ArtistPage artistName={artist} songs={SONGS} onSelectSong={id => go('song',{songId:id})} />
      )}
      {view === 'privacy'  && <PrivacyPage />}
      {view === 'terms'    && <TermsPage />}
      {view === 'contact'  && <ContactPage />}
      <Footer onNav={v => go(v)} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
