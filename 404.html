<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Sinhala Chords</title>
  <script>
    // SPA redirect trick for GitHub Pages.
    // When a user visits /chroads/song/digasiye, GitHub Pages finds no file
    // and serves this 404.html. We capture the path, encode it as a query
    // string, and redirect to the root — which then restores the real URL.
    var pathSegmentsToKeep = 0; // custom domain at root — no path prefix
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body>Redirecting…</body>
</html>
